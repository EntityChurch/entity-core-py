[project]
name = "entity-core"
version = "0.8.0"
description = "Python implementation of the Entity Core Protocol V7"
readme = "../../README.md"
requires-python = ">=3.11"
dependencies = [
    "argon2-cffi>=23.1.0",
    "base58>=2.1.1",
    "cbor2>=5.8.0",
    "cryptography>=41.0.0",
    "pynacl>=1.5.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/entity_core"]
