[project]
name = "entity-cli"
version = "0.8.0"
description = "CLI for Entity Core Protocol V7"
requires-python = ">=3.11"
dependencies = [
    "entity-core>=0.8.0",
    "entity-handlers>=0.8.0",
]

[project.scripts]
entity-core = "entity_cli.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/entity_cli"]
