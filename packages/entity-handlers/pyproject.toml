[project]
name = "entity-handlers"
version = "0.8.0"
description = "Standard handlers for Entity Core Protocol V7"
requires-python = ">=3.11"
dependencies = [
    "entity-core>=0.8.0",
    "google-re2>=1.1.20251105",
    "zeroconf>=0.131.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/entity_handlers"]
